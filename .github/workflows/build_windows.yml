name: Build Windows Executable (model-inference only — no live radar)
#
# This CI build does NOT include the Infineon Radar SDK because the SDK requires
# a manual download from infineon.com and cannot be installed in a GitHub runner.
#
# The resulting .exe fully supports:  loading models, testing gestures on
#   pre-recorded data, training, results tab, VEX AIM with a pre-loaded model.
#
# It does NOT support: clicking "Connect Radar" for live streaming.
#
# For a build that includes live radar streaming, run build_local.bat on a
# Windows machine that has the SDK installed (pip install ifxradarsdk-*.whl first).
#
# Triggers:
#   - Every push to main (fresh build after git push from your Mac)
#   - Every version tag  (git tag v1.0 && git push --tags → GitHub Release)
#   - Manual trigger from the Actions tab (Actions → this workflow → Run workflow)
on:
  push:
    branches: [main, master]
  create:
    tags:
      - 'v*'
  workflow_dispatch:   # manual "Run workflow" button in GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest   # real Windows 2022 VM — produces genuine Windows DLLs

    steps:
      # ── 1. Check out your code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install CPU-only PyTorch FIRST ─────────────────────────────────
      #    This is the critical step.  Installing plain "torch" would pull in
      #    the CUDA build, which requires NVIDIA drivers that Surface devices
      #    don't have → c10.dll / torch_cuda.dll errors at runtime.
      - name: Install CPU-only PyTorch
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      # ── 4. Install remaining dependencies ─────────────────────────────────
      - name: Install app dependencies
        run: |
          pip install `
            "PyQt6>=6.5.0" `
            "pyqtgraph>=0.13.3" `
            "numpy>=1.24.0" `
            "scipy>=1.10.0" `
            "transformers>=4.30.0" `
            "Pillow>=9.0.0" `
            evaluate `
            accelerate `
            "websocket-client>=1.9" `
            pyinstaller

      # ── 5. Build with PyInstaller ──────────────────────────────────────────
      #    The spec automatically detects win32 and uses one-directory mode.
      - name: Build executable
        run: pyinstaller main.spec

      # ── 6. Zip the dist folder ─────────────────────────────────────────────
      #    dist/SensDSv2/ contains SensDSv2.exe + all DLLs.
      #    Zip it so it can be downloaded as a single file and copied to USBs.
      - name: Zip dist folder
        run: |
          Compress-Archive -Path dist\SensDSv2 -DestinationPath SensDSv2-Windows-NoRadar.zip

      # ── 7. Upload as a build artifact ─────────────────────────────────────
      #    Find it at: GitHub → Actions → this run → Artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SensDSv2-Windows-NoRadar
          path: SensDSv2-Windows-NoRadar.zip
          retention-days: 30

      # ── 8. Create a GitHub Release on version tags ─────────────────────────
      #    git tag v1.0 && git push --tags  → zip appears as a release download
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SensDSv2-Windows-NoRadar.zip
          generate_release_notes: true
